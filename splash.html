<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pager UI</title>
    <style>
        /* Reset and Page Centering */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Outer Pager Device Body */
        .pager-device {
            width: 600px;
            height: 440px;
            background-color: #111b24;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Top Section: Screen & Side Buttons */
        .top-section {
            display: flex;
            justify-content: space-between;
            height: 240px;
            width: 100%;
        }

        /* Main Alert Screen */
        .pager-screen {
            background-color: #dbe735;
            flex: 1;
            margin-right: 18px;
            border-radius: 32px;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #111b24;
        }

        .screen-header {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        .screen-main-text {
            font-size: 44px;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        /* Vertical Button Track (Right Side) */
        .vertical-buttons {
            width: 75px;
            background-color: #182531;
            border-radius: 0 24px 24px 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 3px solid #111b24;
        }

        .v-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .v-btn:first-child {
            border-bottom: 3px solid #111b24;
        }

        /* Triangles for Arrows */
        .arrow-up {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 18px solid #ffffff;
        }

        .arrow-down {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #ffffff;
        }

        .arrow-left {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 18px solid #ffffff;
        }

        .arrow-right {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 18px solid #ffffff;
        }

        /* Bottom Control Row */
        .bottom-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 75px;
            margin-top: 5px;
        }

        /* Horizontal Button Track (Bottom Left) */
        .horizontal-buttons {
            width: 230px;
            height: 100%;
            background-color: #182531;
            border-radius: 0 0 24px 24px;
            display: flex;
            overflow: hidden;
        }

        .h-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .h-btn:first-child {
            border-right: 3px solid #111b24;
        }

        /* Status & Pill Interface (Bottom Right) */
        .status-controls {
            display: flex;
            align-items: center;
            gap: 25px;
            padding-right: 10px;
        }

        /* Circular LED Component */
        .led-indicator {
            width: 44px;
            height: 44px;
            background-color: #182531;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .led-core {
            width: 18px;
            height: 18px;
            background-color: #ff1268;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff1268;
        }

        /* Action Pill Button */
        .pill-button {
            width: 110px;
            height: 44px;
            background-color: #182531;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pill-line {
            width: 65px;
            height: 6px;
            background-color: #cbd82d;
            border-radius: 3px;
        }

        /* Branding Footer Segment */
        .branding-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 10px;
        }

        /* Nobl9 Logo Simulation */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text {
            color: #ffffff;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        .logo-dot-matrix {
            display: grid;
            grid-template-columns: repeat(4, 5px);
            gap: 4px;
            margin-bottom: -4px;
        }

        .matrix-dot {
            width: 5px;
            height: 5px;
            background-color: #00baec;
            border-radius: 50%;
        }

        /* Corporate Descriptor Text */
        .descriptor-text {
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.25;
            text-align: right;
            letter-spacing: 0.02em;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="pager-device">
        
        <div class="top-section">
            <div class="pager-screen">
                <div class="screen-header">PAGED AT 3 AM</div>
                <div class="screen-main-text">RESPOND<br>OR IGNORE?</div>
            </div>
            <div class="vertical-buttons">
                <div class="v-btn"><div class="arrow-up"></div></div>
                <div class="v-btn"><div class="arrow-down"></div></div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="horizontal-buttons">
                <div class="h-btn"><div class="arrow-left"></div></div>
                <div class="h-btn"><div class="arrow-right"></div></div>
            </div>
            <div class="status-controls">
                <div class="led-indicator">
                    <div class="led-core"></div>
                </div>
                <div class="pill-button">
                    <div class="pill-line"></div>
                </div>
            </div>
        </div>

        <div class="branding-footer">
            <div class="logo-container">
                <div class="logo-text">NOBL</div>
                <div class="logo-dot-matrix">
                    <div class="matrix-dot" style="opacity: 0.3;"></div><div class="matrix-dot"></div><div class="matrix-dot"></div><div class="matrix-dot"></div>
                    <div class="matrix-dot"></div><div class="matrix-dot"></div><div class="matrix-dot"></div><div class="matrix-dot" style="opacity: 0.3;"></div>
                    <div class="matrix-dot"></div><div class="matrix-dot"></div><div class="matrix-dot" style="opacity: 0.5;"></div><div class="matrix-dot"></div>
                </div>
            </div>
            <div class="descriptor-text">
                Service Level<br>Objectives<br>Platform
            </div>
        </div>

    </div>

</body>
</html>
