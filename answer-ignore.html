<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Nobl9 Card</title>
    <style>
        /* Import clean tech/futuristic fonts */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #2e1d18; /* Wood table background match */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Outer Card Chassis */
        .card {
            width: 560px;
            height: 420px;
            background-color: #0d1b1e; /* Deep matte dark teal/slate finish */
            border-radius: 36px;
            padding: 35px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6), 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* --- Header Branding Area --- */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        /* Left Side: Mock Nobl9 Logo */
        .logo-container {
            display: flex;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #ffffff;
            letter-spacing: 3px;
        }
        .logo-icon {
            margin-left: 4px;
            display: inline-grid;
            grid-template-columns: repeat(3, 4px);
            gap: 2px;
        }
        .logo-dot {
            width: 4px;
            height: 4px;
            background-color: #49c5d3;
            border-radius: 50%;
        }

        /* Right Side: Service Level Objectives Subtext */
        .sub-brand {
            text-align: right;
            color: #ffffff;
            font-size: 0.75rem;
            line-height: 1.3;
            font-weight: 700;
            letter-spacing: 0.5px;
            max-width: 150px;
        }

        /* --- Content Alert Area --- */
        .card-body {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-top: auto;
        }

        .timestamp {
            font-family: 'Orbitron', sans-serif;
            color: #dedede;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .main-status {
            font-family: 'Orbitron', sans-serif;
            color: #49c5d3; /* Electric cyan color match */
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(73, 197, 211, 0.2);
        }

        .description {
            font-family: 'Orbitron', sans-serif;
            color: #49c5d3;
            font-size: 0.88rem;
            line-height: 1.45;
            letter-spacing: 1.2px;
            font-weight: 700;
            max-width: 100%;
            text-transform: uppercase;
        }

        /* Helper Interaction Button */
        .shuffle-btn {
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #49c5d3;
            color: #0d1b1e;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
        }
        .shuffle-btn:hover {
            opacity: 0.9;
        }
        .shuffle-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="logo-container">
                NOBL9
                <div class="logo-icon">
                    <div class="logo-dot"></div><div class="logo-dot"></div><div class="logo-dot"></div>
                    <div class="logo-dot"></div><div class="logo-dot"></div><div class="logo-dot"></div>
                    <div class="logo-dot"></div><div class="logo-dot"></div><div class="logo-dot"></div>
                </div>
            </div>
            <div class="sub-brand">
                Service Level Objectives Platform
            </div>
        </div>
        
        <div class="card-body">
            <div class="timestamp" id="card-time">03 AM LOCAL TIME</div>
            <div class="main-status" id="card-status">IGNORE</div>
            <div class="description" id="card-desc">
                Unless customers complain, it's impossible to know if this is causing a real issue. Remember to add an SLO to avoid this recurring noisy alert.
            </div>
        </div>
    </div>

    <button class="shuffle-btn" onclick="injectRandomPhrase()">SHUFFLE PHRASE</button>

    <script>
        // Lookup simulation file / array dictionary
        const phraseLookup = [
            {
                time: "03 AM LOCAL TIME",
                status: "IGNORE",
                desc: "Unless customers complain, it's impossible to know if this is causing a real issue. Remember to add an SLO to avoid this recurring noisy alert."
            },
            {
                time: "09 PM RUNTIME",
                status: "ACKNOWLEDGED",
                desc: "The database cluster is undergoing routine maintenance operations. Under normal parameters, traffic balances gracefully across backup partitions."
            },
            {
                time: "12 AM SYSTEM TIME",
                status: "RESOLVED",
                desc: "Automated rollback successfully executed on canary nodes. Error rates returned to baseline thresholds. No manual hotfix is needed."
            },
            {
                time: "04 AM LOCAL TIME",
                status: "SILENCED",
                desc: "Alert trigger volume has breached the temporary threshold ceiling. Muting updates until regular business hours begin to prevent fatigue."
            }
        ];

        // Core extraction loop function
        function injectRandomPhrase() {
            // Pick a random dataset index entry
            const randomIndex = Math.floor(Math.random() * phraseLookup.length);
            const activeData = phraseLookup[randomIndex];

            // Map and safely alter text nodes dynamically
            document.getElementById('card-time').innerText = activeData.time;
            document.getElementById('card-status').innerText = activeData.status;
            document.getElementById('card-desc').innerText = activeData.desc;
        }

        // Run routine automatically on mount/load event 
        window.onload = injectRandomPhrase;
    </script>
</body>
</html>
