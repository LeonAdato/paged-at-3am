<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Alert Card</title>
    <style>
        /* Import a clean, futuristic tech font matching the card's style */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #2e1d18; /* Table texture background color */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
        }

        /* Outer Frame Container */
        .card-container {
            width: 700px;
            height: 420px;
            background-color: #161816; /* Thick matte black border */
            border-radius: 42px;
            padding: 32px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Inner Chartreuse/Lime Screen */
        .inner-screen {
            width: 100%;
            height: 100%;
            background-color: #b8d433; /* Vibrant lime-yellow color profile */
            border-radius: 24px;
            padding: 30px 35px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2);
            color: #161816; /* Dark slate text styling for contrast */
        }

        /* Header Row Grid */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 45px;
        }

        .text-time {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 2px;
            word-spacing: 3px;
        }

        .text-id {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Main Body Alert Message area */
        .text-main {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.35;
            letter-spacing: 1.5px;
            max-width: 95%;
            text-transform: uppercase;
            white-space: pre-line;
        }

        .question-counter {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        /* Interactive Refresh Button styling just for testing */
        .refresh-btn {
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #161816;
            color: #b8d433;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .refresh-btn:hover {
            opacity: 0.9;
        }

        /* Arrow and pill shapes from splash.html */
        .arrow-left {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 18px solid #ffffff;
            flex-shrink: 0;
        }

        .arrow-right {
            width: 0; height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 18px solid #ffffff;
            flex-shrink: 0;
        }

        .pill-button {
            background-color: #182531;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Choice button row */
        .choice-row {
            display: flex;
            gap: 16px;
            margin-top: 28px;
            align-items: center;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #182531;
            padding: 13px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }

        .choice-btn:hover {
            opacity: 0.8;
        }

        .pill-button.choice-btn {
            border-radius: 22px;
            padding: 13px 24px;
        }

        .choice-label {
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="question-counter" class="question-counter">0 / 10</div>

    <div class="card-container">
        <div class="inner-screen">
            <div class="header-row">
                <div class="text-time" id="alert-time">03 AM LOCAL TIME</div>
                <div class="text-id" id="alert-id">01</div>
            </div>
            <div class="text-main" id="alert-message"></div>
        </div>
    </div>

    <div style="display:flex; gap:100px; margin-top:25px;">
        <button class="refresh-btn" style="margin-top:0;" onclick="startOver()">START OVER</button>
        <button class="refresh-btn" style="margin-top:0;" onclick="loadRandomPhrase()">NEXT QUESTION</button>
    </div>

    <div class="choice-row">
        <div class="choice-btn" onclick="recordChoice('RESPOND')">
            <div class="arrow-left"></div>
            <span class="choice-label">RESPOND</span>
        </div>
        <div class="pill-button choice-btn" onclick="recordChoice('DEPENDS')">
            <span class="choice-label">DEPENDS</span>
        </div>
        <div class="choice-btn" onclick="recordChoice('IGNORE')">
            <span class="choice-label">IGNORE</span>
            <div class="arrow-right"></div>
        </div>
    </div>

    <script>
        let cards = [];

        async function initCards() {
            const response = await fetch('card_data.json');
            cards = await response.json();
            const questioncount = parseInt(sessionStorage.getItem('questioncount') || '0');
            const correct = parseInt(sessionStorage.getItem('correct') || '0');
            document.getElementById('question-counter').innerText = 'Question ' + questioncount + ' / 10. ' + correct + ' answered correctly.';
            loadRandomPhrase();
        }

        function loadRandomPhrase() {
            if (!cards.length) return;
            const card = cards[Math.floor(Math.random() * cards.length)];

            document.getElementById('alert-time').innerText = "03 AM LOCAL TIME";
            document.getElementById('alert-id').innerText = String(card.id).padStart(2, '0');
            document.getElementById('alert-message').innerText = card.issue;

            sessionStorage.setItem('answer', JSON.stringify(card.answer));
        }

        function startOver() {
            sessionStorage.setItem('questioncount', '0');
            sessionStorage.setItem('correct', '0');
            sessionStorage.setItem('incorrect', '0');
            document.getElementById('question-counter').innerText = 'Question 0 / 10. 0 answered correctly.';
            loadRandomPhrase();
        }

        function recordChoice(choice) {
            // Increment question counter
            const questioncount = parseInt(sessionStorage.getItem('questioncount') || '0') + 1;
            sessionStorage.setItem('questioncount', questioncount);

            // Compare choice to the correct answer title
            const answer = JSON.parse(sessionStorage.getItem('answer'));
            const choiceToTitle = { 'DEPENDS': 'IT DEPENDS' };
            const normalizedChoice = choiceToTitle[choice] || choice;

            if (normalizedChoice === answer.title) {
                const correct = parseInt(sessionStorage.getItem('correct') || '0') + 1;
                sessionStorage.setItem('correct', correct);
                sessionStorage.setItem('result', 'CORRECT');
            } else {
                const incorrect = parseInt(sessionStorage.getItem('incorrect') || '0') + 1;
                sessionStorage.setItem('incorrect', incorrect);
                sessionStorage.setItem('result', 'INCORRECT');
            }

            // Navigate to the answer page — styling chosen there based on answer.title
            sessionStorage.setItem('choice', choice);
            window.location.href = 'answer.html';
        }

        window.onload = initCards;
    </script>

</body>
</html>
